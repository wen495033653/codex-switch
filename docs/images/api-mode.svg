<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex Switch API 模式页面示意图</title>
  <desc id="desc">展示 API 广告入口和 API 配置表单。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10141c"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="promo" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#102a1a"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <rect x="34" y="30" width="1132" height="74" rx="22" fill="#0b0f16" stroke="#243040"/>
  <text x="66" y="77" fill="#ffffff" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Codex Switch</text>
  <text x="380" y="72" fill="#a1a8b3" font-family="Segoe UI, Arial" font-size="16">账号</text>
  <rect x="454" y="47" width="72" height="38" rx="19" fill="#66cc8a"/>
  <text x="478" y="72" fill="#051008" font-family="Segoe UI, Arial" font-size="16" font-weight="700">API</text>
  <text x="556" y="72" fill="#a1a8b3" font-family="Segoe UI, Arial" font-size="16">设置</text>
  <rect x="858" y="47" width="270" height="38" rx="19" fill="#111827" stroke="#243040"/>
  <circle cx="881" cy="66" r="6" fill="#66cc8a"/>
  <text x="900" y="72" fill="#dbe4ef" font-family="Segoe UI, Arial" font-size="15">当前：API 模式</text>

  <rect x="270" y="148" width="660" height="96" rx="24" fill="url(#promo)" stroke="#2f5a3c"/>
  <text x="302" y="182" fill="#d4ffe0" font-family="Segoe UI, Arial" font-size="13" font-weight="700">广告</text>
  <text x="302" y="214" fill="#ffffff" font-family="Segoe UI, Arial" font-size="24" font-weight="800">GPT Pool</text>
  <text x="438" y="214" fill="#d4ffe0" font-family="Segoe UI, Arial" font-size="22" font-weight="700">低价、稳定的 API 站点</text>
  <rect x="780" y="177" width="112" height="36" rx="18" fill="#66cc8a"/>
  <text x="804" y="200" fill="#061009" font-family="Segoe UI, Arial" font-size="14" font-weight="700">获取 Key</text>

  <rect x="270" y="280" width="660" height="324" rx="26" fill="#0d1117" stroke="#2f3a4a"/>
  <text x="306" y="330" fill="#ffffff" font-family="Segoe UI, Arial" font-size="24" font-weight="800">当前正在使用 API 模式</text>
  <rect x="762" y="304" width="108" height="34" rx="17" fill="#14351f"/>
  <text x="792" y="327" fill="#66cc8a" font-family="Segoe UI, Arial" font-size="14" font-weight="700">已启用</text>
  <text x="306" y="386" fill="#a1a8b3" font-family="Segoe UI, Arial" font-size="14">Base URL</text>
  <rect x="306" y="402" width="564" height="48" rx="14" fill="#121821" stroke="#273244"/>
  <text x="330" y="432" fill="#dbe4ef" font-family="Segoe UI, Arial" font-size="16">https://api.example.com/v1</text>
  <text x="306" y="486" fill="#a1a8b3" font-family="Segoe UI, Arial" font-size="14">API Key</text>
  <rect x="306" y="502" width="564" height="48" rx="14" fill="#121821" stroke="#273244"/>
  <text x="330" y="532" fill="#dbe4ef" font-family="Segoe UI, Arial" font-size="16">sk-************</text>
  <rect x="704" y="568" width="166" height="42" rx="21" fill="#66cc8a"/>
  <text x="742" y="595" fill="#061009" font-family="Segoe UI, Arial" font-size="15" font-weight="800">应用 API 模式</text>
