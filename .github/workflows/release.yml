name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri:
    name: Build Tauri app (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - macos-latest
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Load release notes
        id: release_notes
        shell: pwsh
        run: |
          $notesFile = Join-Path ".github/release-notes" "${{ github.ref_name }}.md"
          if (-not (Test-Path -LiteralPath $notesFile)) {
            throw "Missing release notes file: $notesFile"
          }

          "body<<__CODEX_SWITCH_RELEASE_NOTES__" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Get-Content -LiteralPath $notesFile -Raw -Encoding utf8 | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "__CODEX_SWITCH_RELEASE_NOTES__" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Codex Switch ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
