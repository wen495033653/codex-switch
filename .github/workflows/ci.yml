name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: npm ci

      - name: Check renderer and open-source hygiene
        run: npm run check

      - name: Check Tauri
        run: npm run check:tauri

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
